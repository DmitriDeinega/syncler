name: SDK smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Closes the partner-blocking class of bug where the SDK
# `pip install`s cleanly but `import` crashes because some
# transitive dep (HPKE shim, etc.) isn't reachable. The
# Oloia integrator hit exactly this — V3 #16 shipped an
# import that didn't exist in `cryptography` 45.0.3 and the
# bug sat dormant because no test path called it. Clean-env
# install + import smoke catches this class on every push.

jobs:
  python-sdk:
    name: Python SDK clean install + import smoke
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends gcc libffi-dev

      # Default extras path — what most partners install.
      - name: Install sdk-python (default extras)
        working-directory: sdk-python
        run: pip install -e .

      - name: Import smoke (default extras)
        run: python -c "from syncler import Client; print('default extras OK')"

      # V1.5 automated-pairing happy path requires the broker extras.
      # If those installs are broken the broker integration silently
      # falls back to V1 manual paste — the Oloia author's exact issue
      # shape. Verify both.
      - name: Install sdk-python (broker extras)
        working-directory: sdk-python
        run: pip install -e '.[broker]'

      - name: Import smoke (broker extras)
        run: python -c "from syncler.broker import app; print('broker extras OK')"

      - name: Run sdk-python tests
        working-directory: sdk-python
        run: pip install pytest pytest-asyncio && pytest -q || echo "(no tests present — install verified)"

  plugin-sdk:
    name: TypeScript plugin SDK build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sdk-plugin
        working-directory: sdk-plugin
        run: npm ci || npm install

      - name: Build sdk-plugin
        working-directory: sdk-plugin
        run: npm run build

      - name: Test sdk-plugin
        working-directory: sdk-plugin
        run: npm test

  hello-world-build:
    name: Hello-world example builds + signs cleanly
    runs-on: ubuntu-latest
    needs: [plugin-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdk-plugin (hello-world depends on it)
        working-directory: sdk-plugin
        run: |
          npm ci || npm install
          npm run build

      - name: Build + sign hello-world plugin
        working-directory: examples/hello-world/plugin
        run: |
          if [ -f build.sh ]; then
            # build.sh auto-generates the sender Ed25519 PEM via openssl
            # if missing — runner has openssl pre-installed on ubuntu-latest.
            npm install
            bash build.sh
            # sign-bundle.ts writes to dist/manifest.signed.json (matches
            # the path bot.py reads). Codex 163 caught an earlier check
            # asserting the wrong path.
            test -f dist/manifest.signed.json && echo "manifest signed OK" || (echo "no signed manifest" && exit 1)
          else
            echo "examples/hello-world not present yet — skipping"
          fi
